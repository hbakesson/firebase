<svg width="1000" height="700" viewBox="0 0 1000 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Style Definitions -->
  <style>
    .node { filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.3)); }
    .node-rect { fill: rgba(30, 41, 59, 0.9); stroke: rgba(129, 140, 248, 0.5); stroke-width: 2; rx: 12; }
    .node-header { fill: rgba(129, 140, 248, 0.1); rx: 12 12 0 0; }
    .text-header { fill: #E2E8F0; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
    .text-field { fill: #94A3B8; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400; }
    .text-type { fill: #6366F1; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; }
    .link { stroke: rgba(148, 163, 184, 0.3); stroke-width: 2; fill: none; }
    .link-arrow { fill: rgba(148, 163, 184, 0.3); }
    .pk-icon { fill: #F59E0B; font-size: 10px; font-weight: bold; }
  </style>

  <!-- Background Gradient -->
  <rect width="1000" height="700" fill="#0F172A" />
  
  <!-- Relational Links -->
  <path d="M 500 130 V 210" class="link" /> <!-- Org -> User -->
  <path d="M 500 130 L 250 210" class="link" /> <!-- Org -> Project -->
  <path d="M 500 130 L 750 210" class="link" /> <!-- Org -> Team -->
  <path d="M 250 420 V 500" class="link" /> <!-- Project -> Audit -->
  <path d="M 750 440 V 500" class="link" /> <!-- Team -> Budget -->
  <path d="M 250 360 H 650" class="link" /> <!-- Project <-> Team (indirect via FK) -->

  <!-- Organization Node -->
  <g transform="translate(400, 30)" class="node">
    <rect width="200" height="100" class="node-rect" />
    <rect width="200" height="35" class="node-header" />
    <text x="100" y="24" text-anchor="middle" class="text-header">Organization</text>
    <text x="15" y="60" class="text-field">id <tspan class="text-type" x="140">CUID</tspan></text>
    <text x="15" y="80" class="text-field">name <tspan class="text-type" x="140">String</tspan></text>
  </g>

  <!-- User Node (Auth) -->
  <g transform="translate(400, 210)" class="node">
    <rect width="200" height="150" class="node-rect" />
    <rect width="200" height="35" class="node-header" />
    <text x="100" y="24" text-anchor="middle" class="text-header">User</text>
    <text x="15" y="60" class="text-field">id <tspan class="text-type" x="140">CUID</tspan></text>
    <text x="15" y="80" class="text-field">email <tspan class="text-type" x="140">String</tspan></text>
    <text x="15" y="100" class="text-field">role <tspan class="text-type" x="140">Enum</tspan></text>
    <text x="15" y="120" class="text-field">orgId <tspan class="text-type" x="140">FK</tspan></text>
  </g>

  <!-- Project Node -->
  <g transform="translate(150, 210)" class="node">
    <rect width="200" height="210" class="node-rect" />
    <rect width="200" height="35" class="node-header" />
    <text x="100" y="24" text-anchor="middle" class="text-header">Project</text>
    <text x="15" y="60" class="text-field">id <tspan class="text-type" x="140">CUID</tspan></text>
    <text x="15" y="80" class="text-field">name <tspan class="text-type" x="140">String</tspan></text>
    <text x="15" y="100" class="text-field">code <tspan class="text-type" x="140">String</tspan></text>
    <text x="15" y="120" class="text-field">status <tspan class="text-type" x="140">Enum</tspan></text>
    <text x="15" y="140" class="text-field">teamId <tspan class="text-type" x="140">FK</tspan></text>
    <text x="15" y="160" class="text-field">orgId <tspan class="text-type" x="140">FK</tspan></text>
  </g>

  <!-- Team Node -->
  <g transform="translate(650, 210)" class="node">
    <rect width="200" height="230" class="node-rect" />
    <rect width="200" height="35" class="node-header" />
    <text x="100" y="24" text-anchor="middle" class="text-header">Team</text>
    <text x="15" y="60" class="text-field">id <tspan class="text-type" x="140">CUID</tspan></text>
    <text x="15" y="80" class="text-field">name <tspan class="text-type" x="140">String</tspan></text>
    <text x="15" y="100" class="text-field">code <tspan class="text-type" x="140">String</tspan></text>
    <text x="15" y="120" class="text-field">parentId <tspan class="text-type" x="140">FK</tspan></text>
    <text x="15" y="140" class="text-field">orgId <tspan class="text-type" x="140">FK</tspan></text>
  </g>

  <!-- Audit Log Node -->
  <g transform="translate(150, 500)" class="node">
    <rect width="200" height="170" class="node-rect" />
    <rect width="200" height="35" class="node-header" />
    <text x="100" y="24" text-anchor="middle" class="text-header">AuditLog</text>
    <text x="15" y="60" class="text-field">id <tspan class="text-type" x="140">CUID</tspan></text>
    <text x="15" y="80" class="text-field">action <tspan class="text-type" x="140">Enum</tspan></text>
    <text x="15" y="100" class="text-field">entityId <tspan class="text-type" x="140">FK</tspan></text>
    <text x="15" y="120" class="text-field">newValue <tspan class="text-type" x="140">Text</tspan></text>
    <text x="15" y="140" class="text-field">timestamp <tspan class="text-type" x="140">DT</tspan></text>
  </g>

  <!-- Period/Allocation Node (Joined concept) -->
  <g transform="translate(650, 500)" class="node">
    <rect width="200" height="170" class="node-rect" />
    <rect width="200" height="35" class="node-header" />
    <text x="100" y="24" text-anchor="middle" class="text-header">Allocation</text>
    <text x="15" y="60" class="text-field">teamId <tspan class="text-type" x="140">FK</tspan></text>
    <text x="15" y="80" class="text-field">projectId <tspan class="text-type" x="140">FK</tspan></text>
    <text x="15" y="100" class="text-field">periodId <tspan class="text-type" x="140">FK</tspan></text>
    <text x="15" y="120" class="text-field">planned <tspan class="text-type" x="140">Float</tspan></text>
    <text x="15" y="140" class="text-field">actual <tspan class="text-type" x="140">Float</tspan></text>
  </g>
</svg>
